<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ขอโทษนะ ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Kaisei+Opti:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --r1:#e8748f;--r2:#f09eb5;--r3:#fac8d8;--r4:#fde8ef;
  --r5:#fff3f7;--r6:#fff9fb;
  --peach:#fde8d8;--peach2:#f9c8b0;
  --lav:#ede8fd;--lav2:#c8bff5;
  --text:#8b3256;--textmid:#c06080;--textlit:#e0a0b8;
  --paper:#fffcf8;--paperedge:#f0ddd0;
  --gold:#d4a060;--goldsft:#f5e8d0;
  --white:#ffffff;
  --shadow:rgba(220,100,140,.13);
}
html{scroll-behavior:smooth;}
body{font-family:'Sarabun',sans-serif;word-break:keep-all;}

/* PETAL BG */
#petal-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-petal{position:absolute;animation:bgfall linear infinite;}
@keyframes bgfall{
  0%{transform:translateY(-30px) rotate(0deg) scale(1);opacity:.22;}
  50%{opacity:.12;}
  100%{transform:translateY(108vh) rotate(720deg) scale(.6);opacity:0;}
}

/* MUSIC BAR */
#music-bar{
  position:fixed;bottom:20px;right:20px;z-index:100;
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.9);
  border:1px solid var(--r3);
  border-radius:40px;padding:8px 16px;
  box-shadow:0 4px 28px var(--shadow);
}
#music-label{font-size:11px;color:var(--textlit);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.05em;}
#music-upload-btn{
  font-size:11px;letter-spacing:.08em;color:var(--r1);
  background:var(--r4);border:1px solid var(--r3);
  border-radius:20px;padding:5px 11px;cursor:pointer;white-space:nowrap;
  transition:all .2s;font-family:'Sarabun',sans-serif;
}
#music-upload-btn:hover{background:var(--r3);color:var(--white);}
#music-file{display:none;}
.music-icon{display:flex;align-items:flex-end;gap:2px;height:14px;cursor:pointer;}
.music-icon .b{width:3px;border-radius:2px;background:var(--r2);}
.music-icon.playing .b:nth-child(1){animation:b1 .7s ease infinite alternate;}
.music-icon.playing .b:nth-child(2){animation:b2 .5s ease infinite alternate;}
.music-icon.playing .b:nth-child(3){animation:b3 .9s ease infinite alternate;}
.music-icon.playing .b:nth-child(4){animation:b4 .6s ease infinite alternate;}
@keyframes b1{from{height:3px}to{height:14px}}
@keyframes b2{from{height:8px}to{height:4px}}
@keyframes b3{from{height:3px}to{height:12px}}
@keyframes b4{from{height:11px}to{height:3px}}

/* NAV */
#nav{position:fixed;right:14px;top:50%;transform:translateY(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--r3);cursor:pointer;transition:all .4s;border:none;padding:0;}
.nav-dot.active{background:var(--r1);height:22px;border-radius:3px;box-shadow:0 0 8px var(--r2);}

section{min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3.5rem 1.4rem;position:relative;z-index:1;}

/* ═══ SEC 1 ENVELOPE ═══ */
#sec1{
  background:
    radial-gradient(ellipse 80% 60% at 20% 30%,#fde8ef 0%,transparent 70%),
    radial-gradient(ellipse 60% 50% at 80% 70%,#ede8fd 0%,transparent 65%),
    radial-gradient(ellipse 50% 40% at 50% 50%,#fde8d8 0%,transparent 70%),
    #fff9fb;
}

.hint-text{
  font-size:10px;letter-spacing:.55em;color:var(--textlit);text-transform:uppercase;
  margin-bottom:2.2rem;animation:fadein 2s ease .4s forwards;opacity:0;
  font-family:'Kaisei Opti',serif;
}

.env-halo{
  filter:drop-shadow(0 12px 32px rgba(220,100,140,.2)) drop-shadow(0 2px 8px rgba(220,100,140,.1));
}
.env-wrap{perspective:1800px;cursor:pointer;margin-bottom:1.6rem;}
.envelope{width:300px;height:190px;position:relative;transform-style:preserve-3d;transition:transform .08s ease;}

.env-body{
  width:300px;height:190px;
  background:linear-gradient(145deg,var(--white) 0%,#fdf0f5 100%);
  border:1px solid var(--r3);border-radius:8px;
  position:absolute;display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.env-body::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(135deg,transparent 49.3%,rgba(240,158,181,.15) 49.5%,transparent 50.5%);
}

.env-lace{
  position:absolute;top:0;left:0;right:0;height:18px;
  background:repeating-linear-gradient(90deg,transparent 0px,transparent 6px,rgba(240,158,181,.35) 6px,rgba(240,158,181,.35) 7px);
  border-bottom:1px solid rgba(240,158,181,.2);
}

.env-flap{
  position:absolute;top:0;left:0;width:0;height:0;
  border-left:150px solid transparent;border-right:150px solid transparent;
  border-top:96px solid #fde8ef;
  transition:transform .9s cubic-bezier(.4,0,.2,1);
  transform-origin:top center;z-index:3;
  filter:drop-shadow(0 3px 6px rgba(212,83,126,.1));
}
.env-flap.open{transform:rotateX(180deg);}

.env-ll{position:absolute;bottom:0;left:0;width:0;height:0;border-bottom:95px solid #fde8ef;border-right:150px solid transparent;z-index:1;}
.env-rl{position:absolute;bottom:0;right:0;width:0;height:0;border-bottom:95px solid var(--r3);border-left:150px solid transparent;z-index:1;}

.env-flowers{
  position:absolute;bottom:10px;left:0;right:0;text-align:center;
  font-size:14px;letter-spacing:8px;opacity:.3;z-index:2;
}

.seal{
  width:50px;height:50px;border-radius:50%;
  background:linear-gradient(135deg,var(--r1) 0%,var(--r2) 60%,#f5c0d0 100%);
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;font-size:20px;
  border:2.5px solid rgba(255,255,255,.7);
  transition:opacity .4s;
  box-shadow:0 2px 12px rgba(220,100,140,.25);
  animation:sealpulse 3s ease-in-out infinite;
}
@keyframes sealpulse{
  0%,100%{box-shadow:0 2px 12px rgba(220,100,140,.25),0 0 0 0 rgba(220,100,140,.2);}
  50%{box-shadow:0 2px 12px rgba(220,100,140,.25),0 0 0 10px rgba(220,100,140,0);}
}

.stamp{
  position:absolute;top:14px;right:16px;z-index:4;
  width:36px;height:44px;
  background:var(--goldsft);border:1.5px solid var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:15px;
}

.env-addr{position:absolute;bottom:22px;left:28px;z-index:2;display:flex;flex-direction:column;gap:3px;}
.addr-line{height:1px;border-radius:1px;background:rgba(220,100,140,.18);}

.env-subtitle{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:15px;color:var(--textlit);text-align:center;
  margin-top:.6rem;letter-spacing:.1em;
  animation:fadein 2.2s ease 1s forwards;opacity:0;
}

.scroll-cue{
  position:absolute;bottom:2.2rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:5px;
  color:var(--textlit);font-size:10px;letter-spacing:.35em;text-transform:uppercase;
  font-family:'Kaisei Opti',serif;
  animation:nudge 2.4s ease-in-out infinite;cursor:pointer;
}
.scroll-cue svg{width:14px;height:14px;stroke:var(--r3);fill:none;stroke-width:1.5;stroke-linecap:round;}
@keyframes nudge{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(6px);}}

/* ═══ SEC 2 LETTER ═══ */
#sec2{
  background:
    radial-gradient(ellipse 70% 50% at 15% 20%,#fde8d8 0%,transparent 60%),
    radial-gradient(ellipse 60% 45% at 85% 80%,#fde8ef 0%,transparent 60%),
    radial-gradient(ellipse 40% 40% at 50% 50%,#ede8fd 0%,transparent 70%),
    #fff9f5;
}

.letter-scene{
  width:min(440px,95vw);
  display:flex;flex-direction:column;align-items:center;
}

/* gradient border band */
.letter-outer{
  width:100%;
  background:linear-gradient(135deg,var(--r3) 0%,var(--r2) 50%,var(--peach2) 100%);
  border-radius:16px 16px 0 0;
  padding:3px 3px 0;
  box-shadow:0 -2px 20px rgba(220,100,140,.1);
}

.letter-paper{
  width:100%;background:var(--paper);
  border-radius:14px 14px 0 0;
  padding:2.2rem 2rem 2rem;
  position:relative;overflow:hidden;min-height:340px;
}

/* watercolor blobs */
.wc-blob{position:absolute;pointer-events:none;border-radius:50%;filter:blur(30px);opacity:.11;}
.wc-blob-1{width:180px;height:180px;background:var(--r2);top:-40px;right:-30px;}
.wc-blob-2{width:140px;height:140px;background:var(--lav2);bottom:-20px;left:-20px;}
.wc-blob-3{width:100px;height:100px;background:var(--peach2);top:40%;right:10%;}

/* ruled lines */
.letter-paper::before{
  content:'';position:absolute;inset:0;top:4.5rem;
  background:repeating-linear-gradient(transparent,transparent 29px,rgba(220,100,140,.065) 30px);
  pointer-events:none;
}
/* margin */
.letter-paper::after{
  content:'';position:absolute;left:56px;top:0;bottom:0;
  border-left:1.5px solid rgba(220,100,140,.1);pointer-events:none;
}

.corner-fl{position:absolute;font-size:26px;opacity:.07;pointer-events:none;}
.corner-fl.tl{top:10px;left:10px;transform:rotate(-20deg);}
.corner-fl.br{bottom:10px;right:10px;transform:rotate(160deg);}
.corner-fl.tr{top:10px;right:48px;transform:rotate(20deg);font-size:18px;}

.letter-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:1.4rem;padding-left:46px;position:relative;z-index:1;
}
.letter-to{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:17px;color:var(--text);letter-spacing:.06em;line-height:1.7;
}
.letter-date{
  font-family:'Kaisei Opti',serif;
  font-size:10px;color:var(--textlit);letter-spacing:.14em;text-align:right;line-height:1.9;
}

.letter-body{padding-left:46px;min-height:220px;position:relative;z-index:1;}

.letter-line{
  font-size:15px;line-height:2.1;color:#7a3258;
  opacity:0;transform:translateY(5px);
  transition:opacity .6s ease,transform .6s ease;font-weight:400;
}
.letter-line.show{opacity:1;transform:translateY(0);}
.letter-line.italic-line{
  font-style:italic;font-family:'Cormorant Garamond',serif;
  font-size:18px;color:var(--r1);
}
.letter-line.space{margin-top:.5rem;}

.cursor{
  display:inline-block;width:1.5px;height:.9em;
  background:var(--r2);margin-left:1px;vertical-align:middle;border-radius:1px;
  animation:blink .9s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

.letter-sig{padding-left:46px;margin-top:1.6rem;opacity:0;transition:opacity 1s ease;position:relative;z-index:1;}
.letter-sig.show{opacity:1;}
.letter-sig-text{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:26px;color:var(--r1);line-height:1.2;letter-spacing:.03em;
}
.letter-sig-sub{
  font-family:'Kaisei Opti',serif;
  font-size:11px;color:var(--textlit);margin-top:5px;letter-spacing:.18em;
}

/* washi tape strip */
.letter-tape{
  align-self:center;width:70px;height:18px;
  background:linear-gradient(90deg,rgba(240,158,181,.28),rgba(240,158,181,.48),rgba(240,158,181,.28));
  border-top:1px dashed rgba(220,100,140,.18);border-bottom:1px dashed rgba(220,100,140,.18);
  margin-bottom:-3px;z-index:2;
}

.letter-fold{
  width:100%;height:10px;
  background:linear-gradient(180deg,rgba(200,140,160,.1) 0%,transparent 100%);
}
.letter-base{
  width:94%;height:18px;
  background:linear-gradient(135deg,var(--r3),var(--r4),var(--peach));
  border-radius:0 0 10px 10px;
  box-shadow:0 6px 24px rgba(220,100,140,.14);
}

.letter-btns{margin-top:1.6rem;}
.btn-replay{
  background:rgba(255,255,255,.85);border:1px solid var(--r3);color:var(--r1);
  border-radius:30px;padding:9px 24px;font-family:'Sarabun',sans-serif;
  font-size:12px;cursor:pointer;letter-spacing:.1em;
  transition:all .25s;box-shadow:0 2px 12px var(--shadow);
}
.btn-replay:hover{background:var(--r4);box-shadow:0 4px 20px var(--shadow);}

/* ═══ SEC 3 CARD ═══ */
#sec3{
  background:
    radial-gradient(ellipse 70% 55% at 25% 25%,var(--r4) 0%,transparent 65%),
    radial-gradient(ellipse 55% 45% at 75% 75%,var(--lav) 0%,transparent 65%),
    radial-gradient(ellipse 45% 40% at 50% 55%,var(--peach) 0%,transparent 70%),
    #fff6fb;
}

.card-wrapper{
  width:min(340px,92vw);display:flex;flex-direction:column;
  align-items:stretch;
  filter:drop-shadow(0 12px 36px rgba(220,100,140,.18));
  border-radius:24px;overflow:visible;
}

.scene{
  width:100%;height:170px;position:relative;
  background:linear-gradient(160deg,#fff4f8 0%,#ffe8f2 60%,#f8e8ff 100%);
  border:1px solid var(--r3);border-bottom:none;
  border-radius:24px 24px 0 0;overflow:visible;
}

.scene-sparkle{
  position:absolute;font-size:12px;opacity:0;
  animation:sparkle 3s ease-in-out infinite;
}
@keyframes sparkle{0%,100%{opacity:0;transform:scale(.5);}50%{opacity:.35;transform:scale(1);}}

.char{position:absolute;bottom:0;display:flex;flex-direction:column;align-items:center;transition:left .95s cubic-bezier(.4,0,.2,1),right .95s cubic-bezier(.4,0,.2,1);}
.char-l{left:6px;}.char-r{right:6px;}

.speech-bubble{
  position:absolute;top:-46px;
  background:rgba(255,255,255,.95);border-radius:12px;
  padding:6px 11px;font-size:11.5px;color:var(--text);font-weight:500;
  white-space:nowrap;border:1px solid var(--r3);
  opacity:0;transition:opacity .5s;pointer-events:none;
  box-shadow:0 4px 16px rgba(220,100,140,.1);
}
.speech-bubble::after{
  content:'';position:absolute;bottom:-6px;left:50%;transform:translateX(-50%);
  border-left:6px solid transparent;border-right:6px solid transparent;
  border-top:6px solid rgba(255,255,255,.95);
}
.speech-bubble.show{opacity:1;}

.hearts-zone{position:absolute;top:10px;left:50%;transform:translateX(-50%);pointer-events:none;}
.heart-up{position:absolute;font-size:16px;animation:heartrise 1.6s ease forwards;opacity:0;}
@keyframes heartrise{0%{opacity:0;transform:translateY(0) scale(.3);}30%{opacity:1;}100%{opacity:0;transform:translateY(-70px) scale(1.3);}}

.icard{
  background:rgba(255,255,255,.95);
  border:1px solid var(--r3);border-top:none;
  border-radius:0 0 24px 24px;
  padding:1.6rem 1.6rem 1.5rem;text-align:center;
}

.step-dots{display:flex;gap:7px;justify-content:center;margin-bottom:1.1rem;}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--r3);transition:all .35s;}
.step-dot.active{background:var(--r1);width:22px;border-radius:3px;box-shadow:0 0 6px var(--r2);}

.card-msg{font-size:16px;font-weight:500;color:var(--text);margin-bottom:1.4rem;line-height:1.7;}
.card-btns{display:flex;gap:10px;justify-content:center;}

.btn-yes{
  flex:1;padding:13px;border-radius:50px;border:none;
  background:linear-gradient(135deg,var(--r1) 0%,var(--r2) 60%,#f5b8cc 100%);
  color:white;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;transition:all .2s;letter-spacing:.04em;
  box-shadow:0 4px 18px rgba(220,100,140,.3);
}
.btn-yes:hover{transform:scale(1.03);box-shadow:0 6px 24px rgba(220,100,140,.4);}
.btn-yes:active{transform:scale(.97);}

.btn-no{
  flex:1;padding:13px;border-radius:50px;
  border:1px solid var(--r3);background:rgba(255,255,255,.8);
  color:var(--textlit);font-family:'Sarabun',sans-serif;
  font-size:14px;cursor:pointer;transition:all .2s;letter-spacing:.04em;
}
.btn-no:hover{background:var(--r4);}

.final-card{text-align:center;padding:.4rem 0;}
.final-big{font-size:52px;animation:pop .6s cubic-bezier(.4,0,.2,1);}
.final-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:24px;color:var(--r1);margin:.5rem 0 .5rem;letter-spacing:.05em;}
.final-sub{font-size:13px;color:var(--textlit);line-height:2.2;font-weight:300;}
@keyframes pop{0%{transform:scale(.3);opacity:0}60%{transform:scale(1.15);}100%{transform:scale(1);opacity:1;}}

#confetti{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.conf{position:absolute;animation:conffall linear forwards;}
@keyframes conffall{0%{opacity:1;transform:translateY(-20px) rotate(0);}100%{opacity:0;transform:translateY(108vh) rotate(800deg);}}

@keyframes fadein{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="petal-bg"></div>
<div id="confetti"></div>

<div id="nav">
  <button class="nav-dot active" onclick="scrollToSec(0)"></button>
  <button class="nav-dot" onclick="scrollToSec(1)"></button>
  <button class="nav-dot" onclick="scrollToSec(2)"></button>
</div>

<div id="music-bar">
  <div class="music-icon" id="micon" onclick="toggleMusic()">
    <span class="b" style="height:4px"></span>
    <span class="b" style="height:10px"></span>
    <span class="b" style="height:6px"></span>
    <span class="b" style="height:12px"></span>
  </div>
  <span id="music-label">เพลง ♪</span>
  <label id="music-upload-btn" for="music-file">+ เลือกเพลง</label>
  <input type="file" id="music-file" accept="audio/*"/>
  <audio id="audio" loop></audio>
</div>

<!-- SEC 1 ENVELOPE -->
<section id="sec1">
  <p class="hint-text">✦ แตะซองเพื่อเปิดจดหมาย ✦</p>
  <div class="env-halo">
    <div class="env-wrap" id="envWrap">
      <div class="envelope" id="env">
        <div class="env-body">
          <div class="env-lace"></div>
          <div class="stamp">✿</div>
          <div class="env-addr">
            <div class="addr-line" style="width:50px"></div>
            <div class="addr-line" style="width:36px;margin-top:5px"></div>
            <div class="addr-line" style="width:44px;margin-top:5px"></div>
          </div>
          <div class="env-flowers">✿ ❀ ✿</div>
          <div class="seal" id="seal">♡</div>
          <div class="env-ll"></div>
          <div class="env-rl"></div>
        </div>
        <div class="env-flap" id="envFlap"></div>
      </div>
    </div>
  </div>
  <p class="env-subtitle">a letter, just for you</p>
  <div class="scroll-cue" onclick="scrollToSec(1)">
    <span>เลื่อนลง</span>
    <svg viewBox="0 0 14 14"><polyline points="2,4 7,10 12,4"/></svg>
  </div>
</section>

<!-- SEC 2 LETTER -->
<section id="sec2">
  <div class="letter-scene">
    <div class="letter-tape"></div>
    <div class="letter-outer">
      <div class="letter-paper" id="letterPaper">
        <div class="wc-blob wc-blob-1"></div>
        <div class="wc-blob wc-blob-2"></div>
        <div class="wc-blob wc-blob-3"></div>
        <div class="corner-fl tl">❀</div>
        <div class="corner-fl tr">✿</div>
        <div class="corner-fl br">❀</div>
        <div class="letter-header">
          <div class="letter-to">ถึง นุส ♡</div>
          <div class="letter-date" id="letterDate"></div>
        </div>
        <div class="letter-body" id="letterBody"></div>
        <div class="letter-sig" id="letterSig">
          <div class="letter-sig-text">ด้วยรัก, เนทรี ♡</div>
          <div class="letter-sig-sub">ตลอดไป ✦</div>
        </div>
      </div>
    </div>
    <div class="letter-fold"></div>
    <div class="letter-base"></div>
    <div class="letter-btns">
      <button class="btn-replay" onclick="restartLetter()">✦ อ่านอีกครั้ง</button>
    </div>
  </div>
  <div class="scroll-cue" onclick="scrollToSec(2)" style="margin-top:1.8rem">
    <span>ขอโทษนะ</span>
    <svg viewBox="0 0 14 14"><polyline points="2,4 7,10 12,4"/></svg>
  </div>
</section>

<!-- SEC 3 CARD -->
<section id="sec3">
  <div class="card-wrapper">
    <div class="scene" id="scene">
      <span class="scene-sparkle" style="top:18px;left:30%;animation-delay:0s">✦</span>
      <span class="scene-sparkle" style="top:28px;left:55%;animation-delay:.8s">✿</span>
      <span class="scene-sparkle" style="top:14px;left:70%;animation-delay:1.4s">✦</span>
      <span class="scene-sparkle" style="top:35px;left:15%;animation-delay:2s">❀</span>
      <div class="char char-l" id="charL">
        <div class="speech-bubble" id="speechL"></div>
        <img src="Nat.png" alt="" width="100px">
      </div>
      <div class="char char-r" id="charR">
        <div class="speech-bubble" id="speechR"></div>
        <img src="Nus.png" alt="" width="100px">
      </div>
      <div class="hearts-zone" id="heartsZone"></div>
    </div>
    <div class="icard" id="icard">
      <div class="step-dots" id="step-dots"></div>
      <div class="card-msg" id="card-msg"></div>
      <div class="card-btns" id="card-btns">
        <button class="btn-yes" onclick="pressYes()">ให้อภัย ♡</button>
        <button class="btn-no" id="btn-no" onclick="pressNo()">ไม่ 😤</button>
      </div>
    </div>
  </div>
</section>

<script>
/* PETALS */
(function(){
  const c=document.getElementById('petal-bg');
  const cols=['rgba(244,192,209,.7)','rgba(237,147,177,.6)','rgba(253,232,239,.8)','rgba(200,191,245,.6)','rgba(250,200,216,.7)','rgba(249,200,176,.6)'];
  const shapes=['ellipse','circle','rect'];
  for(let i=0;i<28;i++){
    const p=document.createElement('div');
    const s=Math.round(Math.random()*10+4);
    const col=cols[~~(Math.random()*cols.length)];
    const shape=shapes[~~(Math.random()*shapes.length)];
    let svg='';
    if(shape==='ellipse')svg=`<svg xmlns='http://www.w3.org/2000/svg' width='${s}' height='${s}'><ellipse cx='${s/2}' cy='${s/2}' rx='${s*.45}' ry='${s*.28}' fill='${col}' transform='rotate(${Math.random()*180} ${s/2} ${s/2})'/></svg>`;
    else if(shape==='circle')svg=`<svg xmlns='http://www.w3.org/2000/svg' width='${s}' height='${s}'><circle cx='${s/2}' cy='${s/2}' r='${s*.38}' fill='${col}'/></svg>`;
    else svg=`<svg xmlns='http://www.w3.org/2000/svg' width='${s}' height='${s}'><rect x='${s*.1}' y='${s*.1}' width='${s*.8}' height='${s*.8}' rx='${s*.25}' fill='${col}' transform='rotate(${Math.random()*45} ${s/2} ${s/2})'/></svg>`;
    p.innerHTML=svg;
    p.style.cssText=`position:absolute;left:${Math.random()*100}%;animation:bgfall ${Math.random()*14+8}s ${Math.random()*14}s linear infinite;`;
    c.appendChild(p);
  }
})();

/* DATE */
(function(){
  const months=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const d=new Date();
  document.getElementById('letterDate').innerHTML=`${d.getDate()}<br>${months[d.getMonth()]}<br>${d.getFullYear()+543}`;
})();

/* MUSIC */
const audio=document.getElementById('audio');
const micon=document.getElementById('micon');
const mlabel=document.getElementById('music-label');
let mPlaying=false;
document.getElementById('music-file').addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  audio.src=URL.createObjectURL(f);audio.play();mPlaying=true;
  micon.classList.add('playing');mlabel.textContent=f.name.replace(/\.[^.]+$/,'').substring(0,16);
});
function toggleMusic(){
  if(!audio.src)return;
  if(mPlaying){audio.pause();mPlaying=false;micon.classList.remove('playing');}
  else{audio.play();mPlaying=true;micon.classList.add('playing');}
}

/* NAV */
const secs=[document.getElementById('sec1'),document.getElementById('sec2'),document.getElementById('sec3')];
const navDots=document.querySelectorAll('.nav-dot');
function scrollToSec(i){secs[i].scrollIntoView({behavior:'smooth'});}
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){
    const i=secs.indexOf(e.target);
    navDots.forEach((d,j)=>d.classList.toggle('active',i===j));
    if(i===1&&!letterStarted)startLetter();
  }});
},{threshold:.4});
secs.forEach(s=>io.observe(s));

/* ENVELOPE */
let envOpened=false;
document.getElementById('envWrap').addEventListener('click',()=>{
  if(envOpened)return;envOpened=true;
  document.getElementById('envFlap').classList.add('open');
  document.getElementById('seal').style.opacity='0';
  setTimeout(()=>scrollToSec(1),1100);
});
document.getElementById('envWrap').addEventListener('mousemove',function(e){
  if(envOpened)return;
  const r=this.getBoundingClientRect();
  const rx=(e.clientX-r.left-r.width/2)/r.width*14;
  const ry=-(e.clientY-r.top-r.height/2)/r.height*14;
  document.getElementById('env').style.transform=`rotateY(${rx}deg) rotateX(${ry}deg)`;
});
document.getElementById('envWrap').addEventListener('mouseleave',()=>{
  if(!envOpened)document.getElementById('env').style.transform='';
});

/* LETTER */
const letterLines=[
  {text:'ขอโทษนะ',cls:'italic-line',delay:500},
  {text:'',cls:'space',delay:1000},
  {text:'เรายอมรับว่าเรายังต้องปรับปรุงอีกเยอะ',delay:1300},
  {text:'รู้ไว้ด้วยนะ ถึถิ',delay:2500},
  {text:'',cls:'space',delay:3100},
  {text:'เค้ารักเธอมากเลย 🥺',delay:3400},
  {text:'แค่อยากให้เธอรู้ว่า...',cls:'italic-line',delay:4800},
  {text:'เธอสำคัญมากสำหรับเค้า 💕',delay:5900},
  {text:'ไม่มีใครแทนที่เธอได้เลย',delay:7100},
  {text:'',cls:'space',delay:7800},
  {text:'เค้าจะพยายามมากกว่านี้ ☁️',delay:8100},
  {text:'รอเค้าด้วยนะ 🌸',delay:9400},
];
let letterStarted=false,letterTimers=[],cursorEl=null;

function startLetter(){
  letterStarted=true;
  const body=document.getElementById('letterBody');
  body.innerHTML='';
  document.getElementById('letterSig').classList.remove('show');
  cursorEl=document.createElement('span');cursorEl.className='cursor';
  body.appendChild(cursorEl);
  letterLines.forEach((l,i)=>{
    const t=setTimeout(()=>{
      if(cursorEl.parentNode)cursorEl.parentNode.removeChild(cursorEl);
      const div=document.createElement('div');
      div.className='letter-line'+(l.cls?' '+l.cls:'');
      if(l.text){div.textContent=l.text;div.appendChild(cursorEl);}
      body.appendChild(div);
      requestAnimationFrame(()=>setTimeout(()=>div.classList.add('show'),30));
      if(i===letterLines.length-1){
        setTimeout(()=>{
          if(cursorEl.parentNode)cursorEl.parentNode.removeChild(cursorEl);
          document.getElementById('letterSig').classList.add('show');
        },1400);
      }
    },l.delay);
    letterTimers.push(t);
  });
}

function restartLetter(){
  letterTimers.forEach(clearTimeout);letterTimers=[];letterStarted=false;
  document.getElementById('letterBody').innerHTML='';
  document.getElementById('letterSig').classList.remove('show');
  setTimeout(startLetter,200);
}

/* SEC 3 */
const steps=[
  {msg:"ให้อภัยเราได้มั้ย?",lp:6,rp:6,ls:"ผิดไปเเล้ว...",no:"ไม่ 😤"},
  {msg:"ดีกันนนน",lp:44,rp:44,ls:"รักเรามั้ยย",no:"ไม่ 😤"},
  {msg:"ขอโทษจริงๆ นะ",lp:74,rp:74,ls:"เรารักนุสมากก",no:"ไม่ 😤"},
  {msg:"ใกล้เเล้ว ขยับมาใกล้กันอีกนิด",lp:100,rp:100,ls:"อีกนิดนึงง",no:"ไม่ 😤"},
  {msg:"กอดดดดด",lp:116,rp:116,ls:"♡",rs:"♡",no:null},
];
let cur=0;
function buildDots(){
  const d=document.getElementById('step-dots');d.innerHTML='';
  steps.forEach((_,i)=>{const el=document.createElement('div');el.className='step-dot'+(i===cur?' active':'');d.appendChild(el);});
}
function applyStep(s){
  document.getElementById('charL').style.left=s.lp+'px';
  document.getElementById('charR').style.right=s.rp+'px';
  const sL=document.getElementById('speechL'),sR=document.getElementById('speechR');
  sL.textContent=s.ls||'';sR.textContent=s.rs||'';
  setTimeout(()=>{sL.classList.toggle('show',!!s.ls);sR.classList.toggle('show',!!s.rs);},440);
  document.getElementById('card-msg').textContent=s.msg;
  const bn=document.getElementById('btn-no');
  if(s.no===null)bn.style.display='none';
  else{bn.style.display='';bn.textContent=s.no;}
  buildDots();
}
function pressYes(){
  if(cur<steps.length-1){cur++;applyStep(steps[cur]);spawnHearts();}
  if(cur===steps.length-1)setTimeout(showFinal,900);
}
function pressNo(){
  const bn=document.getElementById('btn-no');
  const dx=(Math.random()>.5?1:-1)*16;const dy=(Math.random()>.5?1:-1)*10;
  bn.style.transform=`translate(${dx}px,${dy}px) rotate(${dx>0?4:-4}deg)`;
  setTimeout(()=>bn.style.transform='',340);
}
function spawnHearts(){
  const hz=document.getElementById('heartsZone');
  const h=['❤️','🩷','💕','💗','🌸'];
  for(let i=0;i<6;i++){
    const el=document.createElement('div');el.className='heart-up';
    el.textContent=h[~~(Math.random()*h.length)];
    el.style.left=(Math.random()*50-25)+'px';el.style.animationDelay=(i*.11)+'s';
    hz.appendChild(el);
  }
  setTimeout(()=>hz.innerHTML='',2400);
}
function showFinal(){
  document.getElementById('icard').innerHTML=`<div class="final-card"><div class="final-big">🌸</div><div class="final-title">ขอบคุณนะ ♡</div><div class="final-sub">ต่อไปนี้จะไม่ทำให้เสียใจเเล้ว<br>รักนุสนะ</div></div>`;
  launchConfetti();
}
function launchConfetti(){
  const cw=document.getElementById('confetti');
  const cols=['#f4c0d1','#ed93b1','#fde8ef','#e8748f','#ffd6e8','#c8bff5','#fac8d8','#ffffff','#fde8d8'];
  for(let i=0;i<100;i++){
    const c=document.createElement('div');c.className='conf';
    const s=Math.random()*9+3;
    c.style.cssText=`width:${s}px;height:${s}px;background:${cols[~~(Math.random()*cols.length)]};left:${Math.random()*100}%;animation-duration:${Math.random()*3+1.5}s;animation-delay:${Math.random()*2.5}s;border-radius:${Math.random()>.4?'50%':'4px'};`;
    cw.appendChild(c);
  }
  setTimeout(()=>cw.innerHTML='',6000);
}

applyStep(steps[0]);
</script>
</body>
</html>
