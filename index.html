<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ขอโทษนะ ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --rose:#c4456e;
  --rose-light:#fbeaf0;
  --rose-mid:#e88bac;
  --rose-border:#f0bdd0;
  --rose-dark:#7a243e;
  --text:#8b3054;
  --text-light:#cba0b6;
  --text-muted:#ddb8cb;
  --ink:#5a2040;
  --paper:#fffcf8;
  --white:#ffffff;
}

html{scroll-behavior:smooth;}
body{font-family:'Sarabun',sans-serif;overflow-x:hidden;}

/* ════════════════════════════════
   FLOATING PETALS
════════════════════════════════ */
#petal-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-petal{
  position:absolute;
  border-radius:50% 0 50% 0;
  animation:bgfall linear infinite;
}
@keyframes bgfall{
  0%{transform:translateY(-40px) rotate(0deg);opacity:.18;}
  100%{transform:translateY(105vh) rotate(600deg);opacity:0;}
}

/* ════════════════════════════════
   NAV DOTS
════════════════════════════════ */
#nav{
  position:fixed;right:18px;top:50%;
  transform:translateY(-50%);
  z-index:90;
  display:flex;flex-direction:column;gap:10px;
}
.nav-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--rose-border);
  cursor:pointer;transition:all .35s;
  border:none;padding:0;
}
.nav-dot.active{background:var(--rose);height:22px;border-radius:3px;}

/* ════════════════════════════════
   SECTIONS BASE
════════════════════════════════ */
section{
  min-height:100vh;width:100%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:4rem 1.5rem;
  position:relative;z-index:1;
}

/* ════════════════════════════════
   SEC 1 — ENVELOPE
════════════════════════════════ */
#sec1{
  background:linear-gradient(135deg,#fdf0f5 0%,#fff5f9 50%,#fef0f6 100%);
}

.hint-text{
  font-size:11px;letter-spacing:.4em;color:var(--text-muted);
  text-transform:uppercase;
  margin-bottom:2rem;
  animation:fadein 1.5s ease .4s both;
  transition:opacity .4s;
}

.env-scene{
  perspective:1300px;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;
}

.envelope{
  width:340px;height:220px;
  position:relative;
  transform-style:preserve-3d;
  transition:transform .12s ease;
  animation:fadein 1s ease both;
}

.env-back{
  width:340px;height:220px;
  background:#fef8fa;
  border:1px solid var(--rose-border);
  border-radius:4px;
  position:absolute;top:0;left:0;
  overflow:hidden;
}
.env-back::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    -45deg,
    transparent,transparent 6px,
    rgba(237,147,177,.08) 6px,rgba(237,147,177,.08) 7px
  );
}

.env-left{
  position:absolute;left:0;bottom:0;
  width:0;height:0;
  border-bottom:110px solid #fbeaf0;
  border-right:170px solid transparent;
  z-index:2;
  filter:drop-shadow(1px 0 0 #f0bdd0);
}
.env-right{
  position:absolute;right:0;bottom:0;
  width:0;height:0;
  border-bottom:110px solid #f4c0d1;
  border-left:170px solid transparent;
  z-index:2;
}
.env-bottom-tri{
  position:absolute;bottom:0;left:0;
  width:0;height:0;
  border-bottom:80px solid #fde4ee;
  border-right:170px solid transparent;
  border-left:170px solid transparent;
  z-index:3;
  filter:drop-shadow(0 -1px 0 #f0bdd0);
}

.env-flap-wrap{
  position:absolute;top:0;left:0;width:340px;
  transform-origin:top center;
  transform-style:preserve-3d;
  transition:transform .95s cubic-bezier(.4,0,.2,1);
  z-index:10;
}
.env-flap-wrap.open{transform:rotateX(185deg);}
.env-flap-tri{
  width:0;height:0;
  border-left:170px solid transparent;
  border-right:170px solid transparent;
  border-top:108px solid #fce8f0;
  filter:drop-shadow(0 2px 0 #f0bdd0);
}

.stamp{
  position:absolute;top:14px;right:18px;
  width:38px;height:48px;
  background:var(--rose-light);
  border:1px solid var(--rose-border);
  border-radius:2px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:3px;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.6);
  z-index:9;font-size:16px;
}
.stamp-line{width:22px;height:.5px;background:var(--rose-border);}
.stamp-line2{width:14px;height:.5px;background:var(--rose-border);}

.postmark{
  position:absolute;top:12px;right:62px;
  width:42px;height:42px;
  border:1px dashed var(--rose-border);
  border-radius:50%;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;
  z-index:9;opacity:.7;
}
.postmark-text{
  font-size:7px;letter-spacing:.15em;
  color:var(--text-light);text-transform:uppercase;
}
.postmark-line{width:28px;height:.5px;background:var(--rose-border);}

.addr{
  position:absolute;bottom:28px;left:24px;
  display:flex;flex-direction:column;gap:5px;z-index:5;
}
.addr-line{height:1px;background:var(--rose-border);border-radius:1px;}

.seal{
  position:absolute;top:82px;left:50%;
  transform:translateX(-50%);
  width:52px;height:52px;border-radius:50%;
  background:linear-gradient(135deg,var(--rose),var(--rose-mid));
  border:2.5px solid rgba(255,255,255,.7);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;color:#fff;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  z-index:8;
  animation:sealpulse 3s ease-in-out infinite;
  transition:opacity .45s,transform .45s;
}
@keyframes sealpulse{
  0%,100%{box-shadow:0 0 0 0 rgba(196,69,110,.28);}
  50%{box-shadow:0 0 0 10px rgba(196,69,110,0);}
}

.letter-peek{
  position:absolute;bottom:0;left:50%;
  width:300px;
  background:#fffcf8;
  border:1px solid #e8d5c4;
  border-radius:2px 2px 0 0;
  padding:14px 18px 10px;
  z-index:4;
  transform:translateX(-50%) translateY(0);
  transition:transform .95s cubic-bezier(.4,0,.2,1);
  box-shadow:0 -2px 12px rgba(196,69,110,.06);
}
.letter-peek.risen{transform:translateX(-50%) translateY(-90px);}
.peek-salute{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:13px;color:var(--rose);
  margin-bottom:8px;letter-spacing:.05em;
}
.peek-lines{display:flex;flex-direction:column;gap:7px;}
.peek-line{height:1px;background:rgba(196,69,110,.12);border-radius:1px;}

.env-shadow{
  width:280px;height:16px;
  background:radial-gradient(ellipse,rgba(196,69,110,.13) 0%,transparent 70%);
  margin-top:4px;
}

.deco-line{
  display:flex;align-items:center;gap:12px;
  margin-top:1.6rem;
}
.deco-seg{flex:1;max-width:70px;height:.5px;background:var(--rose-border);}
.deco-heart{font-size:13px;color:var(--rose-mid);}

.env-subtitle{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:14px;color:var(--text-muted);letter-spacing:.08em;
  margin-top:.5rem;
  transition:opacity .4s;
}

.scroll-cue{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  color:var(--text-muted);font-size:10px;
  letter-spacing:.3em;text-transform:uppercase;
  margin-top:2rem;cursor:pointer;
  animation:nudge 2.4s ease-in-out infinite;
}
.scroll-cue svg{
  width:14px;height:14px;stroke:var(--rose-border);
  fill:none;stroke-width:1.5;stroke-linecap:round;
}
@keyframes nudge{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(5px);}
}

/* ════════════════════════════════
   SEC 2 — LETTER
════════════════════════════════ */
#sec2{
  background:linear-gradient(160deg,#fff8f2 0%,#fef2f6 100%);
}

.letter-scene{
  width:min(440px,94vw);
  display:flex;flex-direction:column;align-items:center;
}

.letter-paper{
  width:100%;
  background:var(--paper);
  border:0.5px solid #e8d5c4;
  border-bottom:none;
  border-radius:4px 4px 0 0;
  position:relative;
  overflow:hidden;
  padding:2.4rem 2.6rem 2.2rem 3.8rem;
}
.letter-paper::before{
  content:'';position:absolute;inset:0;top:68px;
  background:repeating-linear-gradient(
    transparent,transparent 31px,
    rgba(196,69,110,.055) 31px,rgba(196,69,110,.055) 32px
  );
  pointer-events:none;
}
.letter-paper::after{
  content:'';position:absolute;left:56px;top:0;bottom:0;
  border-left:1px solid rgba(196,69,110,.14);
  pointer-events:none;
}

.corner-deco{
  position:absolute;top:16px;right:20px;
  width:34px;height:34px;opacity:.15;
}
.corner-deco svg{width:100%;height:100%;}

.letter-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:1.8rem;
}
.letter-to{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:17px;color:var(--rose);letter-spacing:.06em;line-height:1.6;
}
.letter-date{
  font-size:10.5px;color:var(--text-muted);
  letter-spacing:.14em;text-transform:uppercase;
  margin-top:40px;text-align:right;
}

.letter-body{min-height:260px;position:relative;}

.letter-line{
  font-size:14.5px;line-height:2.14;color:var(--ink);
  opacity:0;transform:translateY(5px);
  transition:opacity .6s ease,transform .6s ease;
}
.letter-line.show{opacity:1;transform:translateY(0);}
.letter-line.italic-line{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:16.5px;color:var(--rose);line-height:2.0;
}
.letter-line.space{margin-top:.45rem;}

.cursor{
  display:inline-block;width:1.5px;height:.9em;
  background:var(--rose-mid);margin-left:2px;
  vertical-align:middle;border-radius:1px;
  animation:blink .85s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

.letter-sig{
  margin-top:1.6rem;
  opacity:0;transition:opacity .9s ease;
}
.letter-sig.show{opacity:1;}
.sig-name{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:24px;color:var(--rose);letter-spacing:.04em;line-height:1.3;
}
.sig-under{width:80px;height:.5px;background:var(--rose-border);margin-top:4px;}
.sig-sub{font-size:11px;color:var(--text-muted);margin-top:5px;letter-spacing:.12em;}

.wax-deco{
  position:absolute;bottom:18px;right:22px;
  font-size:18px;opacity:.12;transform:rotate(12deg);
}

.letter-fold{
  width:100%;height:3px;
  background:linear-gradient(180deg,rgba(196,69,110,.06) 0%,rgba(196,69,110,.01) 100%);
  border-left:0.5px solid var(--rose-border);
  border-right:0.5px solid var(--rose-border);
}
.letter-fold::after{
  content:'';display:block;margin-top:1px;height:.5px;background:var(--rose-border);
}

.letter-base{
  width:96%;height:22px;
  background:linear-gradient(135deg,#fbeaf0,#f4c0d1);
  border:0.5px solid var(--rose-border);border-top:none;
  border-radius:0 0 8px 8px;
  box-shadow:0 4px 18px rgba(196,69,110,.08);
}

.letter-btns{margin-top:1.6rem;display:flex;gap:12px;}
.btn-replay{
  background:var(--white);border:0.5px solid var(--rose-border);
  color:var(--text);border-radius:30px;
  padding:9px 26px;
  font-family:'Sarabun',sans-serif;font-size:12px;
  cursor:pointer;letter-spacing:.08em;transition:background .2s;
}
.btn-replay:hover{background:var(--rose-light);}

/* ════════════════════════════════
   SEC 3 — ORIGINAL
════════════════════════════════ */
#sec3{background:linear-gradient(160deg,#fbeaf0 0%,#fff5f8 50%,#fbeaf0 100%);}

.card-wrapper{
  width:min(330px,90vw);display:flex;flex-direction:column;
  align-items:stretch;box-shadow:0 8px 40px rgba(212,83,126,.13);
  border-radius:20px;overflow:visible;
}
.scene{
  width:100%;height:160px;position:relative;
  background:linear-gradient(160deg,#fff0f5 0%,#fde8f0 100%);
  border:0.5px solid var(--rose-border);border-bottom:none;
  border-radius:20px 20px 0 0;overflow:visible;
}
.char{position:absolute;bottom:0;display:flex;flex-direction:column;align-items:center;transition:left .9s cubic-bezier(.4,0,.2,1),right .9s cubic-bezier(.4,0,.2,1);}
.char-l{left:6px;}.char-r{right:6px;}
.speech-bubble{
  position:absolute;top:-44px;
  background:var(--white);border-radius:10px;
  padding:5px 10px;font-size:11px;color:var(--text);font-weight:500;
  white-space:nowrap;border:0.5px solid var(--rose-border);
  opacity:0;transition:opacity .5s;pointer-events:none;
  box-shadow:0 2px 12px rgba(212,83,126,.08);
}
.speech-bubble::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:5px solid var(--white);}
.speech-bubble.show{opacity:1;}
.hearts-zone{position:absolute;top:10px;left:50%;transform:translateX(-50%);pointer-events:none;}
.heart-up{position:absolute;font-size:16px;animation:heartrise 1.5s ease forwards;opacity:0;}
@keyframes heartrise{0%{opacity:0;transform:translateY(0) scale(.3);}30%{opacity:1;}100%{opacity:0;transform:translateY(-65px) scale(1.2);}}
.icard{
  background:var(--white);border:0.5px solid var(--rose-border);
  border-top:none;border-radius:0 0 20px 20px;
  padding:1.6rem 1.6rem 1.5rem;text-align:center;
}
.step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:1.2rem;}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--rose-border);transition:all .35s;}
.step-dot.active{background:var(--rose);width:20px;border-radius:3px;}
.card-msg{font-size:16px;font-weight:500;color:var(--text);margin-bottom:1.5rem;line-height:1.7;}
.card-btns{display:flex;gap:12px;justify-content:center;}
.btn-yes{
  flex:1;padding:13px;border-radius:50px;border:none;
  background:linear-gradient(135deg,var(--rose),var(--rose-mid));
  color:white;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;transition:transform .15s,opacity .2s;letter-spacing:.04em;
}
.btn-yes:hover{opacity:.9;transform:scale(1.02);}
.btn-no{
  flex:1;padding:13px;border-radius:50px;
  border:0.5px solid var(--rose-border);background:var(--rose-light);
  color:var(--text-muted);font-family:'Sarabun',sans-serif;
  font-size:14px;font-weight:400;cursor:pointer;transition:all .2s;letter-spacing:.04em;
}
.btn-no:hover{background:var(--rose-border);}
.final-card{text-align:center;padding:.5rem 0;}
.final-big{font-size:44px;animation:pop .55s cubic-bezier(.4,0,.2,1);}
.final-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--rose);margin:.6rem 0 .4rem;letter-spacing:.04em;}
.final-sub{font-size:13px;color:var(--text-light);line-height:2.1;font-weight:300;}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}

#confetti{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.conf{position:absolute;animation:conffall linear forwards;}
@keyframes conffall{0%{opacity:1;transform:translateY(-20px) rotate(0);}100%{opacity:0;transform:translateY(105vh) rotate(720deg);}}

@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div id="petal-bg"></div>
<div id="confetti"></div>

<div id="nav">
  <button class="nav-dot active" onclick="scrollToSec(0)"></button>
  <button class="nav-dot" onclick="scrollToSec(1)"></button>
  <button class="nav-dot" onclick="scrollToSec(2)"></button>
</div>

<!-- ══════════════════════════════
     SEC 1 : ENVELOPE
══════════════════════════════ -->
<section id="sec1">

  <p class="hint-text" id="hintText"></p>

  <div class="env-scene" id="envScene">
    <div class="envelope" id="env">

      <div class="env-back">
        <div class="letter-peek" id="letterPeek">
          <div class="peek-salute">นุส ♡</div>
          <div class="peek-lines">
            <div class="peek-line" style="width:85%"></div>
            <div class="peek-line" style="width:70%"></div>
            <div class="peek-line" style="width:90%"></div>
            <div class="peek-line" style="width:60%"></div>
          </div>
        </div>
      </div>

      <div class="env-left"></div>
      <div class="env-right"></div>
      <div class="env-bottom-tri"></div>

      <div class="env-flap-wrap" id="envFlap">
        <div class="env-flap-tri"></div>
      </div>

      <div class="stamp">
        <span>✿</span>
        <div class="stamp-line"></div>
        <div class="stamp-line2"></div>
      </div>

      <div class="postmark">
        <div class="postmark-text">Love</div>
        <div class="postmark-line"></div>
        <div class="postmark-text">Mail</div>
      </div>

      <div class="addr">
        <div class="addr-line" style="width:90px"></div>
        <div class="addr-line" style="width:70px"></div>
        <div class="addr-line" style="width:80px"></div>
      </div>

      <div class="seal" id="seal">♡</div>

    </div>
    <div class="env-shadow"></div>
  </div>

  <div class="deco-line">
    <div class="deco-seg"></div>
    <div class="deco-heart"></div>
    <div class="deco-seg"></div>
  </div>

  <p class="env-subtitle" id="envSubtitle"></p>

  <div class="scroll-cue" onclick="scrollToSec(1)">
    <span>เลื่อนลง</span>
    <svg viewBox="0 0 14 14"><polyline points="2,4 7,10 12,4"/></svg>
  </div>

</section>

<!-- ══════════════════════════════
     SEC 2 : LETTER
══════════════════════════════ -->
<section id="sec2">
  <div class="letter-scene">

    <div class="letter-paper" id="letterPaper">

      <div class="corner-deco">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M18 4C18 4 22 12 18 18C14 12 18 4 18 4Z" fill="#c4456e"/>
          <path d="M4 18C4 18 12 22 18 18C12 14 4 18 4 18Z" fill="#c4456e"/>
          <path d="M32 18C32 18 24 22 18 18C24 14 32 18 32 18Z" fill="#c4456e"/>
          <path d="M18 32C18 32 22 24 18 18C14 24 18 32 18 32Z" fill="#c4456e"/>
          <circle cx="18" cy="18" r="4" fill="#c4456e"/>
        </svg>
      </div>

      <div class="letter-header">
        <div class="letter-to">นุส ♡</div>
        <div class="letter-date" id="letterDate"></div>
      </div>

      <div class="letter-body" id="letterBody"></div>

      <div class="letter-sig" id="letterSig">
        <div class="sig-name">ได้มั้ย</div>
        <div class="sig-under"></div>
        <div class="sig-sub"></div>
      </div>

      <div class="wax-deco">❧</div>

    </div>

    <div class="letter-fold"></div>
    <div class="letter-base"></div>

    <div class="letter-btns">
      <button class="btn-replay" onclick="restartLetter()">อ่านอีกครั้ง ↺</button>
    </div>

  </div>

  <div class="scroll-cue" onclick="scrollToSec(2)" style="margin-top:2rem;">
    <span>ต่อไป</span>
    <svg viewBox="0 0 14 14"><polyline points="2,4 7,10 12,4"/></svg>
  </div>
</section>

<!-- ══════════════════════════════
     SEC 3 : ORIGINAL CARD
══════════════════════════════ -->
<section id="sec3">
  <div class="card-wrapper">
    <div class="scene" id="scene">
      <div class="char char-l" id="charL">
        <div class="speech-bubble" id="speechL"></div>
        <img src="Nat.png" alt="" width="100px">
      </div>
      <div class="char char-r" id="charR">
        <div class="speech-bubble" id="speechR"></div>
        <img src="Nus.png" alt="" width="100px">
      </div>
      <div class="hearts-zone" id="heartsZone"></div>
    </div>
    <div class="icard" id="icard">
      <div class="step-dots" id="step-dots"></div>
      <div class="card-msg" id="card-msg"></div>
      <div class="card-btns" id="card-btns">
        <button class="btn-yes" onclick="pressYes()">ดีกัน</button>
        <button class="btn-no" id="btn-no" onclick="pressNo()">ไม่</button>
      </div>
    </div>
  </div>
</section>

<audio id="bgm" src="a.mp3" loop></audio>


<!-- ══════════════════════════════
     SCRIPTS
══════════════════════════════ -->
<script>
/* ── petals ── */
(function(){
  const bg=document.getElementById('petal-bg');

/* ── nav ── */
const secs=[document.getElementById('sec1'),document.getElementById('sec2'),document.getElementById('sec3')];
const navDots=document.querySelectorAll('.nav-dot');
function scrollToSec(i){secs[i].scrollIntoView({behavior:'smooth'});}
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){
    const i=secs.indexOf(e.target);
    navDots.forEach((d,j)=>d.classList.toggle('active',i===j));
    if(i===1&&!letterStarted)startLetter();
  }});
},{threshold:.4});
secs.forEach(s=>io.observe(s));


/* ════════════════════════════════
   SEC 1 — ENVELOPE
════════════════════════════════ */
let envOpened=false;
const envEl=document.getElementById('env');
const scene1=document.getElementById('envScene');

scene1.addEventListener('mousemove',function(e){
  if(envOpened)return;
  const r=envEl.getBoundingClientRect();
  const rx=(e.clientX-r.left-r.width/2)/r.width*10;
  const ry=-(e.clientY-r.top-r.height/2)/r.height*10;
  envEl.style.transform=`rotateY(${rx}deg) rotateX(${ry}deg)`;
});
scene1.addEventListener('mouseleave',function(){
  if(!envOpened)envEl.style.transform='';
});
scene1.addEventListener('click',function(){
  if(envOpened)return;

  const bgm=document.getElementById('bgm');
  bgm.volume=0.4;
  bgm.play().catch(()=>{});
 
  envOpened=true;
  document.getElementById('envFlap').classList.add('open');
  const seal=document.getElementById('seal');
  seal.style.opacity='0';
  seal.style.transform='translateX(-50%) scale(.4)';
  document.getElementById('hintText').style.opacity='0';
  envEl.style.transform='';
  setTimeout(function(){
    document.getElementById('letterPeek').classList.add('risen');
    document.getElementById('envSubtitle').textContent='';
    scene1.style.cursor='default';
  },750);
  setTimeout(function(){scrollToSec(1);},1150);
});

let letterStarted=false;
let letterTimers=[];
let cursorEl=null;

function startLetter(){
  letterStarted=true;
  const body=document.getElementById('letterBody');
  body.innerHTML='';
  document.getElementById('letterSig').classList.remove('show');
  cursorEl=document.createElement('span');
  cursorEl.className='cursor';
  body.appendChild(cursorEl);
  letterLines.forEach((l,i)=>{
    const t=setTimeout(()=>{
      if(cursorEl.parentNode)cursorEl.parentNode.removeChild(cursorEl);
      const div=document.createElement('div');
      div.className='letter-line'+(l.cls?' '+l.cls:'');
      if(l.text){div.textContent=l.text;div.appendChild(cursorEl);}
      body.appendChild(div);
      requestAnimationFrame(()=>setTimeout(()=>div.classList.add('show'),30));
      if(i===letterLines.length-1){
        setTimeout(()=>{
          if(cursorEl.parentNode)cursorEl.parentNode.removeChild(cursorEl);
          document.getElementById('letterSig').classList.add('show');
        },1200);
      }
    },l.delay);
    letterTimers.push(t);
  });
}

function restartLetter(){
  letterTimers.forEach(clearTimeout);letterTimers=[];letterStarted=false;
  const body=document.getElementById('letterBody');
  body.innerHTML='';
  document.getElementById('letterSig').classList.remove('show');
  setTimeout(()=>startLetter(),200);
}

  {msg:"ใกล้เเล้ว ขยับมาใกล้กันอีกนิด ",lp:100,rp:100,ls:"อีกนิดนึงง",no:"ไม่ 😤"},
  {msg:"กอดดดดด ",lp:116,rp:116,ls:"♡",rs:"♡",no:null},
];
let cur=0;
function buildDots(){
  const d=document.getElementById('step-dots');d.innerHTML='';
  steps.forEach((_,i)=>{const el=document.createElement('div');el.className='step-dot'+(i===cur?' active':'');d.appendChild(el);});
}
function applyStep(s){
  document.getElementById('charL').style.left=s.lp+'px';
  document.getElementById('charR').style.right=s.rp+'px';
  const sL=document.getElementById('speechL'),sR=document.getElementById('speechR');
  sL.textContent=s.ls||'';sR.textContent=s.rs||'';
  setTimeout(()=>{sL.classList.toggle('show',!!s.ls);sR.classList.toggle('show',!!s.rs);},420);
  document.getElementById('card-msg').textContent=s.msg;
  const bn=document.getElementById('btn-no');
  if(s.no===null)bn.style.display='none';
  else{bn.style.display='';bn.textContent=s.no;}
  buildDots();
}
function pressYes(){
  if(cur<steps.length-1){cur++;applyStep(steps[cur]);spawnHearts();}
  if(cur===steps.length-1)setTimeout(showFinal,900);
}
function pressNo(){
  const bn=document.getElementById('btn-no');
  const dx=(Math.random()>.5?1:-1)*14;const dy=(Math.random()>.5?1:-1)*8;
  bn.style.transform=`translate(${dx}px,${dy}px) rotate(${dx>0?3:-3}deg)`;
  setTimeout(()=>bn.style.transform='',320);
}
function spawnHearts(){
  const hz=document.getElementById('heartsZone');
  const h=['❤️','🩷','💕','💗'];
  for(let i=0;i<5;i++){
    const el=document.createElement('div');el.className='heart-up';
    el.textContent=h[~~(Math.random()*h.length)];
    el.style.left=(Math.random()*44-22)+'px';el.style.animationDelay=(i*.12)+'s';
    hz.appendChild(el);
  }
  setTimeout(()=>hz.innerHTML='',2200);
}
function showFinal(){
  document.getElementById('icard').innerHTML=`<div class="final-card"><div class="final-big">💖</div><div class="final-title">ขอบคุณนะ</div><div class="final-sub">ต่อไปนี้จะไม่ทำให้เสียใจเเล้ว<br>เรารักนุสที่สุดเลยย</div></div>`;
  launchConfetti();
}
function launchConfetti(){
  const cw=document.getElementById('confetti');
  const cols=['#f4c0d1','#ed93b1','#fbeaf0','#d4537e','#ffd6e8','#ffffff'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');c.className='conf';
    const s=Math.random()*8+4;
    c.style.cssText=`width:${s}px;height:${s}px;background:${cols[~~(Math.random()*cols.length)]};left:${Math.random()*100}%;animation-duration:${Math.random()*2.5+1.5}s;animation-delay:${Math.random()*2}s;border-radius:${Math.random()>.4?'50%':'3px'};`;
    cw.appendChild(c);
  }
  setTimeout(()=>cw.innerHTML='',5000);
}
