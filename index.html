<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>ขอโทษนะ ♡</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cormorant+Garamond:ital,wght@1,400;1,500;1,600&family=Playfair+Display:ital,wght@1,400;1,500&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --rose:#d4537e;--rose-light:#fbeaf0;--rose-mid:#ed93b1;
  --rose-soft:#fff5f8;--rose-border:#f4c0d1;--rose-dark:#72243e;
  --text:#993556;--text-light:#d4a0b5;--text-muted:#e8c8d8;
  --white:#ffffff;--cream:#fffaf7;--paper:#fef9f5;
}
html{scroll-behavior:smooth;}
body{font-family:'Sarabun',sans-serif;word-break:keep-all;}

/* FLOATING PETALS */
#petal-bg{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden;}
.bg-petal{position:absolute;border-radius:50% 0 50% 0;opacity:.18;animation:bgfall linear infinite;}
@keyframes bgfall{0%{transform:translateY(-40px) rotate(0deg);}100%{transform:translateY(105vh) rotate(600deg);}}

/* MUSIC BAR */
#music-bar{
  position:fixed;bottom:24px;right:24px;z-index:100;
  display:flex;align-items:center;gap:10px;
  background:var(--white);border:0.5px solid var(--rose-border);
  border-radius:50px;padding:10px 18px;
  box-shadow:0 2px 24px rgba(212,83,126,.12);
}
#music-label{font-size:11px;color:var(--text-muted);max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.04em;}
#music-upload-btn{
  font-size:11px;letter-spacing:.1em;color:var(--rose);
  background:var(--rose-light);border:0.5px solid var(--rose-border);
  border-radius:20px;padding:5px 12px;cursor:pointer;white-space:nowrap;
  transition:background .2s;font-family:'Sarabun',sans-serif;
}
#music-upload-btn:hover{background:#f4c0d1;}
#music-file{display:none;}
.music-icon{display:flex;align-items:flex-end;gap:2px;height:14px;cursor:pointer;}
.music-icon .b{width:3px;border-radius:2px;background:var(--rose-mid);}
.music-icon.playing .b:nth-child(1){animation:b1 .7s ease infinite alternate;}
.music-icon.playing .b:nth-child(2){animation:b2 .5s ease infinite alternate;}
.music-icon.playing .b:nth-child(3){animation:b3 .9s ease infinite alternate;}
.music-icon.playing .b:nth-child(4){animation:b4 .6s ease infinite alternate;}
@keyframes b1{from{height:3px}to{height:14px}}
@keyframes b2{from{height:8px}to{height:4px}}
@keyframes b3{from{height:3px}to{height:12px}}
@keyframes b4{from{height:11px}to{height:3px}}

/* NAV */
#nav{position:fixed;right:18px;top:50%;transform:translateY(-50%);z-index:90;display:flex;flex-direction:column;gap:10px;}
.nav-dot{width:6px;height:6px;border-radius:50%;background:var(--rose-border);cursor:pointer;transition:all .35s;border:none;padding:0;}
.nav-dot.active{background:var(--rose);height:22px;border-radius:3px;}

section{min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4rem 1.5rem;position:relative;z-index:1;}

/* ===== SECTION 1 ===== */
#sec1{background:linear-gradient(160deg,#fff8fa 0%,#fbeaf0 60%,#fff5f8 100%);}

.hint-text{
  font-size:10px;letter-spacing:.45em;color:var(--text-muted);text-transform:uppercase;
  margin-bottom:2.5rem;animation:fadein 2s ease .5s forwards;opacity:0;
}
.env-wrap{perspective:1600px;cursor:pointer;margin-bottom:2rem;}
.envelope{width:280px;height:180px;position:relative;transform-style:preserve-3d;transition:transform .1s ease;}
.env-body{
  width:280px;height:180px;background:var(--white);border:0.5px solid var(--rose-border);
  border-radius:6px;position:absolute;display:flex;align-items:center;justify-content:center;overflow:hidden;
}
.env-flap{position:absolute;top:0;left:0;width:0;height:0;border-left:140px solid transparent;border-right:140px solid transparent;border-top:90px solid #fbeaf0;transition:transform .85s cubic-bezier(.4,0,.2,1);transform-origin:top center;z-index:3;filter:drop-shadow(0 2px 4px rgba(212,83,126,.08));}
.env-flap.open{transform:rotateX(180deg);}
.env-ll{position:absolute;bottom:0;left:0;width:0;height:0;border-bottom:90px solid #fbeaf0;border-right:140px solid transparent;z-index:1;}
.env-rl{position:absolute;bottom:0;right:0;width:0;height:0;border-bottom:90px solid #f4c0d1;border-left:140px solid transparent;z-index:1;}
.seal{
  width:44px;height:44px;border-radius:50%;
  background:linear-gradient(135deg,var(--rose),var(--rose-mid));
  display:flex;align-items:center;justify-content:center;
  position:relative;z-index:2;font-size:18px;
  border:2px solid rgba(255,255,255,.6);
  transition:opacity .4s,transform .4s;
  animation:sealpulse 3s ease-in-out infinite;
}
@keyframes sealpulse{0%,100%{box-shadow:0 0 0 0 rgba(212,83,126,.2);}50%{box-shadow:0 0 0 8px rgba(212,83,126,0);}}
.stamp{position:absolute;top:12px;right:14px;z-index:4;width:32px;height:40px;border:0.5px solid var(--rose-border);background:var(--rose-light);display:flex;align-items:center;justify-content:center;font-size:15px;}
.env-subtitle{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:14px;color:var(--text-muted);text-align:center;
  margin-top:.75rem;letter-spacing:.08em;
  animation:fadein 2s ease 1s forwards;opacity:0;
}
.scroll-cue{
  position:absolute;bottom:2.5rem;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:6px;
  color:var(--text-muted);font-size:10px;letter-spacing:.3em;text-transform:uppercase;
  animation:nudge 2.2s ease-in-out infinite;cursor:pointer;
}
.scroll-cue svg{width:14px;height:14px;stroke:var(--rose-border);fill:none;stroke-width:1.5;stroke-linecap:round;}
@keyframes nudge{0%,100%{transform:translateX(-50%) translateY(0);}50%{transform:translateX(-50%) translateY(5px);}}

/* ===== SECTION 2: LETTER ===== */
#sec2{background:linear-gradient(160deg,#fff8f2 0%,#fef2f6 100%);}

.letter-scene{
  width:min(420px,94vw);
  display:flex;flex-direction:column;align-items:center;
  gap:0;
}

/* paper */
.letter-paper{
  width:100%;
  background:var(--paper);
  border:0.5px solid #e8d5c4;
  border-radius:4px 4px 0 0;
  box-shadow:0 2px 32px rgba(180,100,80,.08), 0 1px 0 #e8d5c4 inset;
  padding:2.4rem 2.2rem 2rem;
  position:relative;
  font-family:'Sarabun',sans-serif;
  overflow:hidden;
}

/* paper texture lines */
.letter-paper::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(
    transparent,transparent 27px,
    rgba(212,83,126,.06) 28px
  );
  pointer-events:none;top:3.5rem;
}

/* red margin line */
.letter-paper::after{
  content:'';position:absolute;left:52px;top:0;bottom:0;
  border-left:1px solid rgba(212,83,126,.18);
  pointer-events:none;
}

.letter-header{
  display:flex;justify-content:space-between;align-items:flex-start;
  margin-bottom:1.6rem;padding-left:44px;
}
.letter-to{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:15px;color:var(--text);letter-spacing:.05em;
  line-height:1.8;
}
.letter-date{
  font-size:11px;color:var(--text-muted);letter-spacing:.12em;
  text-transform:uppercase;margin-top:2px;
}

.letter-body{
  padding-left:44px;
  min-height:240px;
}

.letter-line{
  font-size:15px;line-height:2;color:#7a3050;
  opacity:0;transform:translateY(4px);
  transition:opacity .55s ease, transform .55s ease;
  font-weight:400;
  position:relative;
}
.letter-line.show{opacity:1;transform:translateY(0);}
.letter-line.italic-line{font-style:italic;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--rose);}
.letter-line.space{margin-top:.6rem;}

/* cursor blink */
.cursor{
  display:inline-block;width:2px;height:1em;
  background:var(--rose-mid);margin-left:2px;
  vertical-align:middle;border-radius:1px;
  animation:blink .85s step-end infinite;
}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:0;}}

.letter-sig{
  padding-left:44px;margin-top:1.4rem;
  opacity:0;transition:opacity .8s ease;
}
.letter-sig.show{opacity:1;}
.letter-sig-text{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:22px;color:var(--rose);
  line-height:1.3;letter-spacing:.04em;
}
.letter-sig-sub{font-size:12px;color:var(--text-muted);margin-top:4px;letter-spacing:.1em;}

/* wax seal decoration on paper */
.paper-deco{
  position:absolute;bottom:14px;right:18px;
  font-size:22px;opacity:.2;
}

/* fold */
.letter-fold{
  width:100%;height:14px;
  background:linear-gradient(180deg,#f5e8dc 0%,#fef9f5 100%);
  border:0.5px solid #e8d5c4;border-top:none;
  border-radius:0;
}

/* bottom ribbon / envelope flap bottom */
.letter-base{
  width:96%;height:22px;
  background:linear-gradient(135deg,#fbeaf0,#f4c0d1);
  border:0.5px solid var(--rose-border);border-top:none;
  border-radius:0 0 8px 8px;
  box-shadow:0 4px 16px rgba(212,83,126,.1);
}

.letter-btns{
  margin-top:1.8rem;
  display:flex;gap:12px;
}
.btn-replay{
  background:var(--white);border:0.5px solid var(--rose-border);color:var(--text);
  border-radius:30px;padding:9px 26px;font-family:'Sarabun',sans-serif;
  font-size:12px;cursor:pointer;letter-spacing:.08em;
  transition:all .2s;
}
.btn-replay:hover{background:var(--rose-light);}

/* ===== SECTION 3 ===== */
#sec3{background:linear-gradient(160deg,#fbeaf0 0%,#fff5f8 50%,#fbeaf0 100%);}

.card-wrapper{
  width:min(330px,90vw);display:flex;flex-direction:column;
  align-items:stretch;box-shadow:0 8px 40px rgba(212,83,126,.13);
  border-radius:20px;overflow:visible;
}
.scene{
  width:100%;height:160px;position:relative;
  background:linear-gradient(160deg,#fff0f5 0%,#fde8f0 100%);
  border:0.5px solid var(--rose-border);border-bottom:none;
  border-radius:20px 20px 0 0;overflow:visible;
}
.char{position:absolute;bottom:0;display:flex;flex-direction:column;align-items:center;transition:left .9s cubic-bezier(.4,0,.2,1),right .9s cubic-bezier(.4,0,.2,1);}
.char-l{left:6px;}.char-r{right:6px;}
.speech-bubble{
  position:absolute;top:-44px;
  background:var(--white);border-radius:10px;
  padding:5px 10px;font-size:11px;color:var(--text);font-weight:500;
  white-space:nowrap;border:0.5px solid var(--rose-border);
  opacity:0;transition:opacity .5s;pointer-events:none;
  box-shadow:0 2px 12px rgba(212,83,126,.08);
}
.speech-bubble::after{content:'';position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);border-left:5px solid transparent;border-right:5px solid transparent;border-top:5px solid var(--white);}
.speech-bubble.show{opacity:1;}
.hearts-zone{position:absolute;top:10px;left:50%;transform:translateX(-50%);pointer-events:none;}
.heart-up{position:absolute;font-size:16px;animation:heartrise 1.5s ease forwards;opacity:0;}
@keyframes heartrise{0%{opacity:0;transform:translateY(0) scale(.3);}30%{opacity:1;}100%{opacity:0;transform:translateY(-65px) scale(1.2);}}
.icard{
  background:var(--white);border:0.5px solid var(--rose-border);
  border-top:none;border-radius:0 0 20px 20px;
  padding:1.6rem 1.6rem 1.5rem;text-align:center;
}
.step-dots{display:flex;gap:6px;justify-content:center;margin-bottom:1.2rem;}
.step-dot{width:6px;height:6px;border-radius:50%;background:var(--rose-border);transition:all .35s;}
.step-dot.active{background:var(--rose);width:20px;border-radius:3px;}
.card-msg{font-size:16px;font-weight:500;color:var(--text);margin-bottom:1.5rem;line-height:1.7;}
.card-btns{display:flex;gap:12px;justify-content:center;}
.btn-yes{
  flex:1;padding:13px;border-radius:50px;border:none;
  background:linear-gradient(135deg,var(--rose),var(--rose-mid));
  color:white;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:500;
  cursor:pointer;transition:transform .15s,opacity .2s;letter-spacing:.04em;
}
.btn-yes:hover{opacity:.9;transform:scale(1.02);}
.btn-no{
  flex:1;padding:13px;border-radius:50px;
  border:0.5px solid var(--rose-border);background:var(--rose-light);
  color:var(--text-muted);font-family:'Sarabun',sans-serif;
  font-size:14px;font-weight:400;cursor:pointer;transition:all .2s;letter-spacing:.04em;
}
.btn-no:hover{background:var(--rose-border);}
.final-card{text-align:center;padding:.5rem 0;}
.final-big{font-size:44px;animation:pop .55s cubic-bezier(.4,0,.2,1);}
.final-title{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:22px;color:var(--rose);margin:.6rem 0 .4rem;letter-spacing:.04em;}
.final-sub{font-size:13px;color:var(--text-light);line-height:2.1;font-weight:300;}
@keyframes pop{0%{transform:scale(.5);opacity:0}70%{transform:scale(1.12);}100%{transform:scale(1);opacity:1;}}

#confetti{position:fixed;inset:0;pointer-events:none;z-index:200;overflow:hidden;}
.conf{position:absolute;animation:conffall linear forwards;}
@keyframes conffall{0%{opacity:1;transform:translateY(-20px) rotate(0);}100%{opacity:0;transform:translateY(105vh) rotate(720deg);}}

@keyframes fadein{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div id="petal-bg"></div>
<div id="confetti"></div>

<div id="nav">
  <button class="nav-dot active" onclick="scrollToSec(0)"></button>
  <button class="nav-dot" onclick="scrollToSec(1)"></button>
  <button class="nav-dot" onclick="scrollToSec(2)"></button>
</div>

<div id="music-bar">
  <div class="music-icon" id="micon" onclick="toggleMusic()">
    <span class="b" style="height:4px"></span><span class="b" style="height:10px"></span>
    <span class="b" style="height:6px"></span><span class="b" style="height:12px"></span>
  </div>
  <span id="music-label">เพลง ♪</span>
  <label id="music-upload-btn" for="music-file">+ เลือกเพลง</label>
  <input type="file" id="music-file" accept="audio/*"/>
  <audio id="audio" loop></audio>
</div>

<!-- SEC 1: ENVELOPE -->
<section id="sec1">
  <p class="hint-text"></p>
  <div class="env-wrap" id="envWrap">
    <div class="envelope" id="env">
      <div class="env-body">
        <div class="stamp">✿</div>
        <div class="seal" id="seal">♡</div>
        <div class="env-ll"></div>
        <div class="env-rl"></div>
      </div>
      <div class="env-flap" id="envFlap"></div>
    </div>
  </div>
  <p class="env-subtitle"></p>
  <div class="scroll-cue" onclick="scrollToSec(1)">
    <span>เลื่อนลง</span>
    <svg viewBox="0 0 14 14"><polyline points="2,4 7,10 12,4"/></svg>
  </div>
</section>

<!-- SEC 2: LETTER -->
<section id="sec2">
  <div class="letter-scene">
    <div class="letter-paper" id="letterPaper">
      <div class="paper-deco">✿</div>
      <div class="letter-header">
        <div>
          <div class="letter-to">ถึง นุส ♡</div>
        </div>
        <div class="letter-date" id="letterDate"></div>
      </div>
      <div class="letter-body" id="letterBody">
        <!-- lines injected by JS -->
      </div>
      <div class="letter-sig" id="letterSig">
        <div class="letter-sig-text">ด้วยรัก,<br>เนทรี ♡</div>
        <div class="letter-sig-sub">ตลอดไป</div>
      </div>
    </div>
    <div class="letter-fold"></div>
    <div class="letter-base"></div>
    <div class="letter-btns">
      <button class="btn-replay" onclick="restartLetter()">อ่านอีกครั้ง ↺</button>
    </div>
  </div>
  <div class="scroll-cue" onclick="scrollToSec(2)" style="margin-top:2rem">
    <span>ขอโทษนะ</span>
    <svg viewBox="0 0 14 14"><polyline points="2,4 7,10 12,4"/></svg>
  </div>
</section>

<!-- SEC 3: CARD -->
<section id="sec3">
  <div class="card-wrapper">
    <div class="scene" id="scene">
      <div class="char char-l" id="charL">
        <div class="speech-bubble" id="speechL"></div>
        <img src="Nat.png" alt="" width="100px">
      </div>
      <div class="char char-r" id="charR">
        <div class="speech-bubble" id="speechR"></div>
        <img src="Nus.png" alt="" width="100px">
      </div>
      <div class="hearts-zone" id="heartsZone"></div>
    </div>
    <div class="icard" id="icard">
      <div class="step-dots" id="step-dots"></div>
      <div class="card-msg" id="card-msg"></div>
      <div class="card-btns" id="card-btns">
        <button class="btn-yes" onclick="pressYes()">ให้อภัย</button>
        <button class="btn-no" id="btn-no" onclick="pressNo()">ไม่</button>
      </div>
    </div>
  </div>
</section>

<script>
/* PETALS */
(function(){
  const c=document.getElementById('petal-bg');
  const cols=['#f4c0d1','#ed93b1','#fbeaf0','#f4c0d1','#ffd6e8'];
  for(let i=0;i<24;i++){
    const p=document.createElement('div');p.className='bg-petal';
    const s=Math.random()*8+5;
    p.style.cssText=`width:${s}px;height:${s*1.5}px;background:${cols[~~(Math.random()*cols.length)]};left:${Math.random()*100}%;animation-duration:${Math.random()*12+9}s;animation-delay:${Math.random()*12}s;`;
    c.appendChild(p);
  }
})();

/* DATE */
(function(){
  const months=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  const d=new Date();
  document.getElementById('letterDate').textContent=`${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()+543}`;
})();

/* MUSIC */
const audio=document.getElementById('audio');
const micon=document.getElementById('micon');
const mlabel=document.getElementById('music-label');
let mPlaying=false;
document.getElementById('music-file').addEventListener('change',function(){
  const f=this.files[0];if(!f)return;
  audio.src=URL.createObjectURL(f);audio.play();mPlaying=true;
  micon.classList.add('playing');
  mlabel.textContent=f.name.replace(/\.[^.]+$/,'').substring(0,18);
});
function toggleMusic(){
  if(!audio.src)return;
  if(mPlaying){audio.pause();mPlaying=false;micon.classList.remove('playing');}
  else{audio.play();mPlaying=true;micon.classList.add('playing');}
}

/* NAV */
const secs=[document.getElementById('sec1'),document.getElementById('sec2'),document.getElementById('sec3')];
const navDots=document.querySelectorAll('.nav-dot');
function scrollToSec(i){secs[i].scrollIntoView({behavior:'smooth'});}
const io=new IntersectionObserver(entries=>{
  entries.forEach(e=>{if(e.isIntersecting){
    const i=secs.indexOf(e.target);
    navDots.forEach((d,j)=>d.classList.toggle('active',i===j));
    if(i===1&&!letterStarted)startLetter();
  }});
},{threshold:.4});
secs.forEach(s=>io.observe(s));

/* ENVELOPE */
let envOpened=false;
document.getElementById('envWrap').addEventListener('click',()=>{
  if(envOpened)return;envOpened=true;
  document.getElementById('envFlap').classList.add('open');
  document.getElementById('seal').style.opacity='0';
  document.querySelector('.hint-text').style.opacity='0';
  setTimeout(()=>scrollToSec(1),1050);
});
document.getElementById('envWrap').addEventListener('mousemove',function(e){
  if(envOpened)return;
  const r=this.getBoundingClientRect();
  const rx=(e.clientX-r.left-r.width/2)/r.width*12;
  const ry=-(e.clientY-r.top-r.height/2)/r.height*12;
  document.getElementById('env').style.transform=`rotateY(${rx}deg) rotateX(${ry}deg)`;
});
document.getElementById('envWrap').addEventListener('mouseleave',()=>{
  if(!envOpened)document.getElementById('env').style.transform='';
});

/* ====== LETTER ====== */
const letterLines=[
  {text:'ขอโทษนะ',cls:'italic-line',delay:400},
  {text:'',cls:'space',delay:900},
  {text:'เรายอมรับว่าเรายังต้องปรับปรุงอีกเยอะ',delay:1100},
  {text:'รู้ไว้ด้วยนะ ถึถิ',delay:2200},
  {text:'',cls:'space',delay:2900},
  {text:'เค้ารักเธอมากเลย 🥺',delay:3100},
  {text:'แค่อยากให้เธอรู้ว่า...',cls:'italic-line',delay:4400},
  {text:'เธอสำคัญมากสำหรับเค้า 💕',delay:5500},
  {text:'ไม่มีใครแทนที่เธอได้เลย',delay:6700},
  {text:'',cls:'space',delay:7400},
  {text:'เค้าจะพยายามมากกว่านี้ ☁️',delay:7700},
  {text:'รอเค้าด้วยนะ 🌸',delay:8900},
];
let letterStarted=false;
let letterTimers=[];
let cursorEl=null;

function startLetter(){
  letterStarted=true;
  const body=document.getElementById('letterBody');
  body.innerHTML='';
  document.getElementById('letterSig').classList.remove('show');

  // create cursor
  cursorEl=document.createElement('span');
  cursorEl.className='cursor';
  body.appendChild(cursorEl);

  letterLines.forEach((l,i)=>{
    const t=setTimeout(()=>{
      // remove cursor from old position
      if(cursorEl.parentNode)cursorEl.parentNode.removeChild(cursorEl);

      const div=document.createElement('div');
      div.className='letter-line'+(l.cls?' '+l.cls:'');
      if(l.text){
        div.textContent=l.text;
        // append cursor after last char
        div.appendChild(cursorEl);
      }
      body.appendChild(div);
      requestAnimationFrame(()=>setTimeout(()=>div.classList.add('show'),30));

      if(i===letterLines.length-1){
        // show signature
        setTimeout(()=>{
          if(cursorEl.parentNode)cursorEl.parentNode.removeChild(cursorEl);
          document.getElementById('letterSig').classList.add('show');
        },1200);
      }
    },l.delay);
    letterTimers.push(t);
  });
}

function restartLetter(){
  letterTimers.forEach(clearTimeout);letterTimers=[];letterStarted=false;
  const body=document.getElementById('letterBody');
  body.innerHTML='';
  document.getElementById('letterSig').classList.remove('show');
  setTimeout(()=>startLetter(),200);
}

/* SEC 3 */
const steps=[
  {msg:"ให้อภัยเราได้มั้ย?",lp:6,rp:6,ls:"ผิดไปเเล้ว...",no:"ไม่ 😤"},
  {msg:"ดีกันนนน ",lp:44,rp:44,ls:"รักเรามั้ยย",no:"ไม่ 😤"},
  {msg:"ขอโทษจริงๆ นะ ",lp:74,rp:74,ls:"เรารักนุสมากก",no:"ไม่ 😤"},
  {msg:"ใกล้เเล้ว ขยับมาใกล้กันอีกนิด ",lp:100,rp:100,ls:"อีกนิดนึงง",no:"ไม่ 😤"},
  {msg:"กอดดดดด ",lp:116,rp:116,ls:"♡",rs:"♡",no:null},
];
let cur=0;
function buildDots(){
  const d=document.getElementById('step-dots');d.innerHTML='';
  steps.forEach((_,i)=>{const el=document.createElement('div');el.className='step-dot'+(i===cur?' active':'');d.appendChild(el);});
}
function applyStep(s){
  document.getElementById('charL').style.left=s.lp+'px';
  document.getElementById('charR').style.right=s.rp+'px';
  const sL=document.getElementById('speechL'),sR=document.getElementById('speechR');
  sL.textContent=s.ls||'';sR.textContent=s.rs||'';
  setTimeout(()=>{sL.classList.toggle('show',!!s.ls);sR.classList.toggle('show',!!s.rs);},420);
  document.getElementById('card-msg').textContent=s.msg;
  const bn=document.getElementById('btn-no');
  if(s.no===null)bn.style.display='none';
  else{bn.style.display='';bn.textContent=s.no;}
  buildDots();
}
function pressYes(){
  if(cur<steps.length-1){cur++;applyStep(steps[cur]);spawnHearts();}
  if(cur===steps.length-1)setTimeout(showFinal,900);
}
function pressNo(){
  const bn=document.getElementById('btn-no');
  const dx=(Math.random()>.5?1:-1)*14;const dy=(Math.random()>.5?1:-1)*8;
  bn.style.transform=`translate(${dx}px,${dy}px) rotate(${dx>0?3:-3}deg)`;
  setTimeout(()=>bn.style.transform='',320);
}
function spawnHearts(){
  const hz=document.getElementById('heartsZone');
  const h=['❤️','🩷','💕','💗'];
  for(let i=0;i<5;i++){
    const el=document.createElement('div');el.className='heart-up';
    el.textContent=h[~~(Math.random()*h.length)];
    el.style.left=(Math.random()*44-22)+'px';el.style.animationDelay=(i*.12)+'s';
    hz.appendChild(el);
  }
  setTimeout(()=>hz.innerHTML='',2200);
}
function showFinal(){
  document.getElementById('icard').innerHTML=`<div class="final-card"><div class="final-big">🌸</div><div class="final-title">ขอบคุณนะ</div><div class="final-sub">ต่อไปนี้จะไม่ทำให้เสียใจเเล้ว<br>รักนุสนะ</div></div>`;
  launchConfetti();
}
function launchConfetti(){
  const cw=document.getElementById('confetti');
  const cols=['#f4c0d1','#ed93b1','#fbeaf0','#d4537e','#ffd6e8','#ffffff'];
  for(let i=0;i<80;i++){
    const c=document.createElement('div');c.className='conf';
    const s=Math.random()*8+4;
    c.style.cssText=`width:${s}px;height:${s}px;background:${cols[~~(Math.random()*cols.length)]};left:${Math.random()*100}%;animation-duration:${Math.random()*2.5+1.5}s;animation-delay:${Math.random()*2}s;border-radius:${Math.random()>.4?'50%':'3px'};`;
    cw.appendChild(c);
  }
  setTimeout(()=>cw.innerHTML='',5000);
}

applyStep(steps[0]);
